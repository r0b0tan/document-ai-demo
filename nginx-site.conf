# nginx site config for your HOST nginx (the one behind Cloudflare).
# Copy to /etc/nginx/sites-available/docai and symlink to sites-enabled.
# Replace docai.example.com with your actual domain.

server {
    listen 80;
    server_name docai.example.com;

    # Cloudflare handles SSL, so this is HTTP only.
    # If you use "Full (Strict)" SSL mode in Cloudflare, add SSL here too.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }
}
